name: taoyao 高端机 clang12 SukiSU
on:
  workflow_dispatch:

jobs:
  build:
    name: Build taoyao SukiSU
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - uses: actions/checkout@v4

    - name: 环境变量配置
      run: |
        cat config.env | grep KERNEL_SOURCE= >> $GITHUB_ENV
        cat config.env | grep KERNEL_SOURCE_BRANCH= >> $GITHUB_ENV
        cat config.env | grep KERNEL_ZIP_NAME= >> $GITHUB_ENV
        cat config.env | grep LLVM_CONFIG= >> $GITHUB_ENV
        cat config.env | grep KERNEL_IMAGE_NAME= >> $GITHUB_ENV
        cat config.env | grep NEED_DTBO= >> $GITHUB_ENV
        cat config.env | grep SWITCH_PYTHON= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KVM= >> $GITHUB_ENV
        cat config.env | grep ENABLE_LXC_DOCKER= >> $GITHUB_ENV

    - name: 构建编译环境
      run: |
        sudo apt-get update
        sudo -E apt-get -y -qq install git make bc bison ccache openssl zip kmod cpio flex libelf-dev curl libssl-dev libtfm-dev wget device-tree-compiler ca-certificates python3 binutils binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi build-essential
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: 下载 Google clang12 编译器
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        git clone -q --depth=1 --single-branch https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android12-release clang-aosp

    - name: 下载内核源码
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

    # ==================== SukiSU ====================
    - name: 配置 SukiSU-Ultra (Builtin)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

    # ==================== 配置处理 ====================
    - name: 准备 kernel config
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        mkdir -p out
        
        if [ -f "arch/arm64/configs/vendor/taoyao_QGKI.config" ]; then
          CONFIG_FILE="arch/arm64/configs/vendor/taoyao_QGKI.config"
        elif [ -f "arch/arm64/configs/vendor/taoyao_GKI.config" ]; then
          CONFIG_FILE="arch/arm64/configs/vendor/taoyao_GKI.config"
        else
          echo "❌ 未找到 config 文件"
          ls -la arch/arm64/configs/vendor/
          exit 1
        fi
        
        echo "✅ 使用: $CONFIG_FILE"
        cp $CONFIG_FILE out/.config
        echo "CONFIG_BUILD_ARM64_APPENDED_DTB_IMAGE=y" >> out/.config
        echo "CONFIG_BUILD_ARM64_KERNEL_COMPRESSION_GZIP=y" >> out/.config
        echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> out/.config

    # ==================== LXC + Docker（已修复） ====================
    - name: 开启 LXC + Docker 配置
      if: env.ENABLE_LXC_DOCKER == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        wget -q https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/2.0.0/lxc-docker-config3.txt -O lxc-docker-config3.txt
        cat lxc-docker-config3.txt >> out/.config
        echo "✅ LXC/Docker 配置已添加"

    - name: 添加 runc 补丁
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/runcpatch.sh
        chmod a+x runcpatch.sh
        if [ -f android-kernel/kernel/cgroup.c ]; then
          ./runcpatch.sh android-kernel/kernel/cgroup.c
        fi
        if [ -f android-kernel/kernel/cgroup/cgroup.c ]; then
          ./runcpatch.sh android-kernel/kernel/cgroup/cgroup.c
        fi

    - name: 设置 ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: taoyao-clang12-sukisu
        max-size: 2G

    - name: 开始编译内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/clang-r416183b/bin:$PATH
        export KBUILD_BUILD_HOST=17
        export KBUILD_BUILD_USER=HyperPower
        
        make -j$(nproc --all) O=out ARCH=arm64 olddefconfig
        
        if [ ${{env.LLVM_CONFIG}} = y ]; then
          make -j$(nproc --all) CC="ccache clang" CXX="ccache clang++" O=out ARCH=arm64 \
            CLANG_TRIPLE="aarch64-linux-gnu-" CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" LLVM=1 LLVM_IAS=1
        else
          make -j$(nproc --all) CC="ccache clang" O=out ARCH=arm64 \
            CROSS_COMPILE="aarch64-linux-gnu-" CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
        fi

    - name: 准备打包内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=.*;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=1;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        
        cp android-kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/ 2>/dev/null || \
        cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || \
        cp android-kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        
        rm -rf AnyKernel3/.git* AnyKernel3/README.md AnyKernel3/ramdisk AnyKernel3/modules AnyKernel3/patch

    - name: 上传内核
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_ZIP_NAME }}
        path: kernel_workspace/AnyKernel3/*
